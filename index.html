<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER Dashboard - Somdej 17</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Sarabun:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }
        .profile-img { width: 100%; height: 350px; object-fit: cover; object-position: center 30%; }
        .hidden { display: none; }
    </style>

    <script>
        function is_InAppBrowser() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isChrome = /Chrome/.test(userAgent);
            return (!isChrome && /FBAV|FBAN|LINE|Tiktok|Instagram|Twitter|Snapchat|Telegram|MicroMessenger|Threads/i.test(userAgent));
        }

        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // ถ้าเป็น In-App Browser และยังไม่มี parameter ยืนยัน ให้เปิด Modal
            if (is_InAppBrowser() && !urlParams.has('openExternalBrowser')) {
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('inAppBrowserModal').classList.remove('hidden');

                const urlToRedirect = new URL(window.location.href);
                urlToRedirect.searchParams.set('openExternalBrowser', '1');

                document.getElementById('confirmButton').addEventListener('click', () => {
                    window.location.href = urlToRedirect.toString();
                });

                document.getElementById('copyLinkButton').addEventListener('click', async () => {
                    await navigator.clipboard.writeText(urlToRedirect.toString());
                    const msg = document.getElementById('copyMessage');
                    msg.classList.remove('hidden');
                    setTimeout(() => msg.classList.add('hidden'), 2000);
                });
            }
        });
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="main-content" class="max-w-2xl w-full bg-white rounded-3xl shadow-xl overflow-hidden">
      <div class="relative">
        <img src="S__66945041.jpg" class="profile-img" alt="Team Photo">
        <div class="absolute bottom-0 left-0 right-0 h-24 bg-gradient-to-t from-white to-transparent"></div>
      </div>

      <div class="px-8 pb-10">
        <div class="text-center mb-8 -mt-6 relative z-10">
          <h1 class="text-3xl font-bold text-gray-800">อุบัติเหตุ - ฉุกเฉิน</h1>
          <p class="text-gray-500 font-light mt-1">โรงพยาบาลสมเด็จพระสังฆราช องค์ที่ 17</p>
        </div>

        <div class="space-y-4">
          <a href="https://docs.google.com/spreadsheets/d/16MplgChXEybID_IylHIqXx7dDPeNHR5ZSjxzrzGyoR0/edit?gid=1086563887" target="_blank" 
             class="flex items-center justify-between px-6 py-5 bg-white border border-gray-100 text-gray-700 font-medium rounded-2xl hover:bg-green-50 hover:border-green-300 hover:text-green-700 transition duration-300 shadow-sm">
             <div class="flex items-center">
               <span class="text-2xl mr-4">📊</span>
               <span>รายงานเทศกาลสงกรานต์ 2569 (11-17)</span>
             </div>
             <i class="fa-solid fa-chevron-right text-gray-300"></i>
          </a>

          <a href="https://docs.google.com/spreadsheets/d/1kR9v9Ma9Tn8cLGmT5JWkqXXbyppFw82kqAEkmqS0FJQ/edit?gid=231922794" target="_blank" 
             class="flex items-center justify-between px-6 py-5 bg-white border border-gray-100 text-gray-700 font-medium rounded-2xl hover:bg-blue-50 hover:border-blue-300 hover:text-blue-700 transition duration-300 shadow-sm">
             <div class="flex items-center">
               <span class="text-2xl mr-4">📦</span>
               <span>ภาระงานศูนย์ Refer</span>
             </div>
             <i class="fa-solid fa-chevron-right text-gray-300"></i>
          </a>

          <a href="https://docs.google.com/spreadsheets/d/1WaRyTEhrMqnmFn3hhfNYU5RYbLPOlVE4z5SpWggbhZI/edit?gid=1241388804" target="_blank" 
             class="flex items-center justify-between px-6 py-5 bg-white border border-gray-100 text-gray-700 font-medium rounded-2xl hover:bg-purple-50 hover:border-purple-300 hover:text-purple-700 transition duration-300 shadow-sm">
             <div class="flex items-center">
               <span class="text-2xl mr-4">👥</span>
               <span>จำนวน Refer ปี 2569</span>
             </div>
             <i class="fa-solid fa-chevron-right text-gray-300"></i>
          </a>
        </div>
        <footer class="mt-10 text-center text-[10px] text-gray-400 uppercase tracking-widest">
          ER Somdej17 Management System
        </footer>
      </div>
    </div>

    <div id="inAppBrowserModal" class="fixed inset-0 bg-gray-900 bg-opacity-80 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center">
            <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-arrow-up-right-from-square text-red-600 text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">เปิดในเบราว์เซอร์หลัก</h2>
            <p class="text-gray-500 mb-6 text-sm">กรุณาเปิดผ่าน Chrome หรือ Safari เพื่อประสิทธิภาพสูงสุดค่ะ</p>
            <div class="flex flex-col gap-3">
                <button id="confirmButton" class="w-full py-3 rounded-xl font-semibold text-white bg-red-600 hover:bg-red-700">เปิดเบราว์เซอร์</button>
                <button id="copyLinkButton" class="w-full py-3 rounded-xl font-semibold text-gray-600 bg-gray-100 hover:bg-gray-200">คัดลอกลิงก์</button>
                <span id="copyMessage" class="text-green-600 text-sm font-medium hidden">คัดลอกสำเร็จ!</span>
            </div>
        </div>
    </div>

</body>
</html>
